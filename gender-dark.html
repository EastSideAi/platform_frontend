<!doctype html>
<!-- gender-dark.html — два шага сразу после входа: 1) выбор персонажа, 2) имя.
     Фон — то же ночное небо, что на login (funnel-assets/sky-bg.png). На обоих шагах
     есть кнопка «Назад» (шаг 1 → login, шаг 2 → шаг 1). Текст выровнен влево.
     Поток: login-dark.html → gender-dark.html → anketa-dark.html.
     Пишет localStorage('es_gender')='boy'|'girl' и localStorage('es_name'). Без «е». -->
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EastSide — Кто вы</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Onest:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* единый шрифт интерфейса — менять тут одной строкой */
:root{--font-display:'SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif}
*,*::before,*::after{font-family:var(--font-display)!important}

  :root {
    --base: #03081C; --tx: #FFFFFF; --tx-soft: #C5CBE3; --tx-mute: #8B93B8;
    --violet: #2676e7; --violet-2: #5CB4FF; --violet-deep: #1E72E6; --violet-soft: #9FCBFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Manrope', 'Segoe UI', sans-serif; background: var(--base); color: var(--tx); overflow: hidden; }

  /* ── ночное небо как на входе ── */
  .sky { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: url('funnel-assets/sky-bg.png') no-repeat center center / cover;
    animation: skyIn 1s ease both; }
  @keyframes skyIn { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: none; } }
  .glow { position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(1100px 760px at 50% 8%, rgba(30,90,200,.26), transparent 62%),
      radial-gradient(900px 620px at 50% 116%, rgba(20,80,210,.16), transparent 60%),
      radial-gradient(140% 100% at 50% 50%, transparent 52%, rgba(2,5,18,.62) 100%); }

  .wrap {
    position: relative; z-index: 2; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: clamp(24px, 5vh, 56px) clamp(20px, 5vw, 64px) clamp(104px, 16vh, 140px);
  }
  /* левая колонка фиксированной ширины — все выровнено влево по ее краю */
  .panel { width: min(100%, 560px); animation: pageIn .55s cubic-bezier(.32,.72,0,1) both; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .step { display: none; }
  .step.on { display: block; }

  .head { text-align: left; }
  .h1 { font-family: 'Onest','Manrope',sans-serif; font-size: clamp(30px, 4vw, 46px); font-weight: 700; letter-spacing: -1.6px; line-height: 1.04; color: #fff; }
  .sub { margin-top: 12px; font-size: clamp(14px, 1.5vw, 16px); line-height: 1.5; color: var(--tx-soft); max-width: 46ch; }

  /* ── карточки персонажей ── */
  .cards { margin-top: clamp(24px, 4vh, 32px); display: flex; gap: clamp(16px, 2.2vw, 24px); }
  .pick {
    position: relative; flex: 1 1 0; min-width: 0; cursor: pointer;
    display: flex; flex-direction: column;
    border-radius: 22px; overflow: hidden; padding: 0;
    background: linear-gradient(160deg, rgba(30,46,92,.34), rgba(12,24,56,.42));
    border: 1.5px solid rgba(160,195,255,.2);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 22px 54px rgba(2,5,20,.45);
    transition: border-color .18s, box-shadow .18s, transform .12s;
    text-align: left; color: inherit; font-family: inherit;
    animation: cardIn .7s cubic-bezier(.16,1,.3,1) both;
  }
  .pick:nth-child(1) { animation-delay: .1s; }
  .pick:nth-child(2) { animation-delay: .18s; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  .pick:hover { border-color: rgba(120,185,255,.55); transform: translateY(-3px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 26px 60px rgba(2,5,20,.55), 0 0 0 1px rgba(60,150,250,.25); }

  /* подпись СВЕРХУ */
  .pick-label {
    position: relative; z-index: 2; display: flex; align-items: center; gap: 12px;
    padding: 16px 16px 8px; font-size: 16.5px; font-weight: 700; color: #fff;
  }
  .pick-radio {
    margin-left: auto; width: 23px; height: 23px; flex: none; border-radius: 50%;
    border: 2px solid rgba(160,195,255,.4); display: grid; place-items: center;
    transition: border-color .18s, background .18s;
  }
  .pick-radio svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: opacity .16s, transform .16s; color: #fff; }

  /* фото-вырезка без темного фона: персонаж стоит на градиенте карточки */
  .pick-photo { position: relative; width: 100%; height: clamp(220px, 32vh, 320px); overflow: hidden; }
  .pick-photo::before { content: ''; position: absolute; left: 50%; bottom: -8%; width: 84%; height: 70%;
    transform: translateX(-50%); border-radius: 50%;
    background: radial-gradient(closest-side, rgba(43,120,230,.3), transparent 72%); }
  .pick-photo img { position: relative; z-index: 1; width: 100%; height: 100%;
    object-fit: contain; object-position: 50% 100%; display: block;
    filter: drop-shadow(0 10px 22px rgba(2,6,22,.5)); }

  .pick.sel { border-color: rgba(120,185,255,.85);
    box-shadow: inset 0 0 30px rgba(43,143,255,.28), inset 0 1px 0 rgba(255,255,255,.18), 0 26px 60px rgba(2,5,20,.55), 0 0 0 1px rgba(80,165,255,.5); }
  .pick.sel .pick-radio { border-color: transparent;
    background: linear-gradient(140deg, var(--violet-2), var(--violet-deep)); box-shadow: 0 0 12px rgba(55,140,248,.8); }
  .pick.sel .pick-radio svg { opacity: 1; transform: scale(1); }

  /* ── поле имени (шаг 2) ── */
  .field { margin-top: clamp(22px, 4vh, 34px); }
  .lbl { display: block; font-size: 13px; font-weight: 700; color: var(--tx-soft); margin-bottom: 8px; }
  .inp { width: 100%; height: 54px; padding: 0 18px; border-radius: 14px;
    background: rgba(3,9,28,.55); border: 1.5px solid rgba(150,185,255,.18); color: #fff;
    font: 600 16px 'Manrope', sans-serif; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; }
  .inp::placeholder { color: #5C6488; font-weight: 500; }
  .inp:focus { border-color: rgba(38,118,231,.7); background: rgba(8,16,44,.7);
    box-shadow: inset 0 0 18px rgba(38,118,231,.2), 0 0 0 3px rgba(38,118,231,.14); }

  /* ── нижняя панель: Назад · шаги · Дальше (как на анкете и диагностике) ── */
  .foot {
    position: fixed; z-index: 5; left: 50%; bottom: clamp(18px, 3.4vh, 34px); transform: translateX(-50%);
    width: min(92vw, 560px);
    display: flex; align-items: center; gap: 16px;
    padding: 12px 16px; border-radius: 16px;
    background: rgba(4,10,36,.72);
    -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    border: 1px solid rgba(80,130,255,.22);
    box-shadow: 0 18px 44px rgba(2,6,22,.6);
  }
  .btn-back {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(100,150,255,.22); border-radius: 13px; cursor: pointer;
    background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); font: 600 14px 'Onest','Manrope',sans-serif; padding: 12px 20px;
    transition: background .15s;
  }
  .btn-back:hover { background: rgba(255,255,255,.14); }
  .foot-mid { flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px; }
  .foot-step { font-size: 12px; color: rgba(180,200,255,.65); white-space: nowrap; }
  .dots { display: flex; align-items: center; gap: 8px; }
  .dots .d { width: 8px; height: 8px; border-radius: 50%; flex: none; background: rgba(255,255,255,.18); box-shadow: inset 0 0 0 1.5px rgba(100,150,255,.4); }
  .dots .d.done { background: #2676e7; box-shadow: none; }
  .dots .d.cur { width: 15px; height: 15px; background: #2676e7; box-shadow: 0 0 0 4px rgba(43,143,255,.3), inset 0 0 0 3px rgba(255,255,255,.88); }
  .btn-next {
    display: inline-flex; align-items: center; gap: 8px;
    border: 0; border-radius: 13px; cursor: pointer;
    background: #2073E6; color: #fff; font: 700 14px 'Onest','Manrope',sans-serif;
    padding: 12px 28px; white-space: nowrap; flex-shrink: 0;
    box-shadow: inset 0 0 18px rgba(120,190,255,.85), inset 0 1px 0 rgba(255,255,255,.3);
    transition: background .12s;
  }
  .btn-next:hover { background: #2B8FFF; }
  .btn-next[disabled] { background: #C2CAE2; color: #fff; box-shadow: none; cursor: not-allowed; }
  .btn-next svg, .btn-back svg { width: 17px; height: 17px; transform: rotate(-45deg); }

  @media (max-width: 560px) {
    .cards { gap: 16px; }
    .pick-label { font-size: 15px; padding: 12px 12px 8px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .sky, .panel, .pick { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>
<div class="sky"></div>
<div class="glow"></div>

<div class="wrap">
  <div class="panel">

    <!-- ШАГ 1 — персонаж -->
    <div class="step on" id="step1">
      <div class="head">
        <h1 class="h1">Кто вы?</h1>
        <p class="sub">Выберите персонажа — он пройдет этот путь к поступлению вместе с вами.</p>
      </div>

      <div class="cards">
        <button class="pick" type="button" data-gender="boy">
          <span class="pick-label">Парень
            <span class="pick-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5L19.5 7"/></svg></span>
          </span>
          <span class="pick-photo"><img src="funnel-assets/mascot-cut.png" alt="Парень" /></span>
        </button>
        <button class="pick" type="button" data-gender="girl">
          <span class="pick-label">Девушка
            <span class="pick-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5L19.5 7"/></svg></span>
          </span>
          <span class="pick-photo"><img src="funnel-assets/mascot-girl-cut.png" alt="Девушка" /></span>
        </button>
      </div>
    </div>

    <!-- ШАГ 2 — имя -->
    <div class="step" id="step2">
      <div class="head">
        <h1 class="h1">Как вас зовут?</h1>
        <p class="sub">Чтобы обращаться к вам по имени на всем пути подготовки.</p>
      </div>

      <div class="field">
        <label class="lbl" for="name">Ваше имя</label>
        <input class="inp" id="name" type="text" placeholder="Например, Анастасия" maxlength="40" autocomplete="given-name" />
      </div>
    </div>

  </div>
</div>

<!-- нижняя панель: Назад · шаги · Дальше -->
<div class="foot">
  <button class="btn-back" id="navBack" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    Назад
  </button>
  <div class="foot-mid">
    <span class="foot-step" id="footStep">Шаг 1 из 2</span>
    <span class="dots" id="footDots"></span>
  </div>
  <button class="btn-next" id="navNext" type="button" disabled>
    Дальше
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </button>
</div>

<script>
(function () {
  'use strict';
  var picks = document.querySelectorAll('.pick');
  var navNext = document.getElementById('navNext');
  var navBack = document.getElementById('navBack');
  var nameInp = document.getElementById('name');
  var step1 = document.getElementById('step1');
  var step2 = document.getElementById('step2');
  var footStep = document.getElementById('footStep');
  var footDots = document.getElementById('footDots');
  var chosen = null;
  var cur = 1;
  var TOTAL = 2;

  // вернуть прежний выбор, если возвращаемся на экран
  try {
    var pg = localStorage.getItem('es_gender');
    var pn = localStorage.getItem('es_name');
    if (pn) nameInp.value = pn;
    if (pg) picks.forEach(function (x) { if (x.dataset.gender === pg) { x.classList.add('sel'); chosen = pg; } });
  } catch (e) {}

  function valid() { return cur === 1 ? !!chosen : nameInp.value.trim().length > 0; }

  function renderFoot() {
    navNext.disabled = !valid();
    footStep.textContent = 'Шаг ' + cur + ' из ' + TOTAL;
    var html = '';
    for (var i = 1; i <= TOTAL; i++) {
      var cls = 'd' + (i < cur ? ' done' : '') + (i === cur ? ' cur' : '');
      html += '<span class="' + cls + '"></span>';
    }
    footDots.innerHTML = html;
  }

  function show(n) {
    cur = n;
    step1.classList.toggle('on', n === 1);
    step2.classList.toggle('on', n === 2);
    renderFoot();
    if (n === 2) setTimeout(function () { nameInp.focus(); }, 60);
  }

  picks.forEach(function (p) {
    p.addEventListener('click', function () {
      picks.forEach(function (x) { x.classList.remove('sel'); });
      p.classList.add('sel');
      chosen = p.dataset.gender;
      renderFoot();
    });
  });

  nameInp.addEventListener('input', renderFoot);
  nameInp.addEventListener('keydown', function (e) { if (e.key === 'Enter' && valid()) navNext.click(); });

  // «Дальше»: шаг 1 → шаг 2; шаг 2 → анкета
  navNext.addEventListener('click', function () {
    if (!valid()) return;
    try { localStorage.setItem('es_gender', chosen); } catch (e) {}
    if (cur === 1) { show(2); return; }
    try { localStorage.setItem('es_name', nameInp.value.trim()); } catch (e) {}
    window.location.href = 'anketa-dark.html';
  });

  // «Назад»: шаг 2 → шаг 1; шаг 1 → вход
  navBack.addEventListener('click', function () {
    if (cur === 2) show(1);
    else window.location.href = 'login-dark.html';
  });

  renderFoot();
})();
</script>
</body>
</html>
