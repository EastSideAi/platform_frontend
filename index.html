<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>EastSide AI — Платформа</title>
  <meta name="description" content="EastSide AI — платформа поступления в вузы Китая: кабинеты ученика и родителя, дорожная карта, документы, оплаты." />

  <!-- Инициализация темы ДО рендера и до подключения стилей: убираем мигание.
       'system' снимает data-theme (тему берет prefers-color-scheme из tokens.css). -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('es-theme'); // 'light' | 'dark' | 'system'
        var html = document.documentElement;
        if (saved === 'dark' || saved === 'light') html.setAttribute('data-theme', saved);
        else html.removeAttribute('data-theme'); // system / нет выбора — идем за ОС
      } catch (e) { /* приватный режим — остаемся на дефолте */ }
    })();
  </script>

  <!-- Шрифт: только Manrope, везде -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />

  <!-- Дизайн-токены, затем базовые стили (порядок важен). Хешируются на сборке
       (Vite), бастер кеша вручную больше не нужен. -->
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Конфигурация: база бэка. Пусто => фронт живет на mock (graceful-fallback). -->
  <script>
    // TODO: вписать боевой URL API при деплое (РФ-хостинг). Пусто = mock-режим.
    window.ES_API_BASE = '';
    // База AI-ассистента (бот EastSide, /kb/ask). Пусто = same-origin: браузер
    // бьёт по /kb/* своего домена, а прокси (Vite dev / vercel.json rewrites)
    // server-side ходит на бота. Так CORS бота не нужен вовсе.
    window.ES_BOT_BASE = '';
  </script>
</head>
<body>
  <a class="u-skip-link" href="#main">Перейти к содержимому</a>
  <div id="app"></div>

  <!-- Vite-сборка: один минифицированный бандл, React внутри. Babel из браузера
       убран (JSX в коде нет). Порядок модулей задан в src/main.js. -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
