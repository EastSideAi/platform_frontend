<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>EastSide AI — Витрина компонентов</title>

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('es-theme');
        var html = document.documentElement;
        if (saved === 'dark' || saved === 'light') html.setAttribute('data-theme', saved);
        else html.removeAttribute('data-theme');
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
  <script>window.ES_API_BASE = '';</script>
</head>
<body>
  <div id="app"></div>

  <!-- Vite-сборка: те же lib+ui, что и продукт, плюс showcase-gallery. -->
  <script type="module" src="/src/showcase-main.js"></script>
</body>
</html>
