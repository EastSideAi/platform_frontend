<!doctype html>
<!-- intro-dark.html — экран входа с анимацией-заставкой.
     Слева фростед-карточка (Вход/Регистрация), справа сцена: звезда едет по
     гребню и прочерчивает светящуюся тропу → Артем выбегает следом и замирает.
     Гора векторная (SMIL), маскот — assets/mascot-cut.png. Без буквы «е». -->
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EastSide — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Poiret+One&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Arkhip';
    src: url('assets/fonts/arkhip/Arkhip_font.otf') format('opentype'),
         url('assets/fonts/arkhip/Arkhip_font.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  :root {
    --base: #03081C; --tx: #FFFFFF; --tx-soft: #C5CBE3; --tx-mute: #8B93B8;
    --violet: #2B8FFF; --violet-2: #5CB4FF; --violet-deep: #1E72E6; --violet-soft: #9FCBFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Onest', 'Segoe UI', sans-serif; background: var(--base); color: var(--tx); overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(1000px 700px at 70% 34%, rgba(30,90,200,.2), transparent 64%),
      radial-gradient(720px 520px at 8% 100%, rgba(22,100,230,.1), transparent 60%);
  }
  /* затемнение левой части под карточку */
  .veil { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(90deg, rgba(3,8,28,.92) 0%, rgba(3,8,28,.66) 26%, rgba(3,8,28,.12) 52%, transparent 66%); }

  .wrap {
    position: relative; z-index: 1; height: 100vh; display: flex; align-items: center;
    gap: clamp(16px, 3vw, 56px); padding: 28px clamp(28px, 6vw, 120px);
  }

  /* ── СЦЕНА справа ── */
  .stage { flex: 1 1 auto; align-self: stretch; position: relative; min-width: 0;
    display: flex; align-items: center; justify-content: center; }
  .scene-inner { position: relative; width: min(100%, 780px); aspect-ratio: 280 / 142; }
  .scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; overflow: visible; }

  .mtn-body { opacity: 0; animation: mtnIn 1s ease both .15s; }
  @keyframes mtnIn { from { opacity: 0; } to { opacity: 1; } }

  .route-dot { opacity: 0; transform-box: fill-box; transform-origin: center; }
  .route-dot.d0 { animation: dotIn .4s ease both .80s; }
  .route-dot.d1 { animation: dotIn .4s ease both 1.05s; }
  .route-dot.d2 { animation: dotIn .4s ease both 1.30s; }
  .route-dot.d3 { animation: dotIn .4s ease both 1.58s; }
  .route-dot.d4 { animation: dotIn .4s ease both 1.90s; }
  .route-dot.d5 { animation: dotIn .4s ease both 2.20s; }
  .route-dot.d6 { animation: dotIn .4s ease both 2.45s; }
  @keyframes dotIn { 0% { opacity: 0; transform: scale(.2); } 60% { opacity: 1; transform: scale(1.35); } 100% { opacity: 1; transform: scale(1); } }

  .peak-star { opacity: 0; transform-box: fill-box; transform-origin: center;
    animation: starPop .55s cubic-bezier(.2,1.5,.4,1) both 2.5s, starTwinkle 2.8s ease-in-out infinite 3.1s; }
  @keyframes starPop { 0% { opacity: 0; transform: scale(.2); } 60% { opacity: 1; transform: scale(1.28); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes starTwinkle { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.55); } }
  .peak-halo { opacity: 0; animation: haloIn .7s ease both 2.55s, haloPulse 3s ease-in-out infinite 3.3s; }
  @keyframes haloIn { from { opacity: 0; } to { opacity: .55; } }
  @keyframes haloPulse { 0%,100% { opacity: .4; } 50% { opacity: .68; } }
  .burst-ring { opacity: 0; transform-box: fill-box; transform-origin: center;
    animation: ringBurst .7s ease-out forwards 2.55s; }
  @keyframes ringBurst { 0% { opacity: .9; transform: scale(.25); } 100% { opacity: 0; transform: scale(4); } }
  .peak-glow { opacity: 0; animation: fadeIn 1.1s ease both 2.4s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .bg-star { animation: bgTwinkle 3.4s ease-in-out infinite; }
  .bg-star:nth-child(2n) { animation-duration: 4.2s; animation-delay: .8s; }
  .bg-star:nth-child(3n) { animation-duration: 2.8s; animation-delay: 1.4s; }
  @keyframes bgTwinkle { 0%,100% { opacity: .5; } 50% { opacity: .15; } }

  /* ── МАСКОТ ── */
  .m-shadow {
    position: absolute; left: 4%; bottom: 5%; width: 19%; height: 5%;
    background: radial-gradient(closest-side, rgba(3,8,28,.6), transparent 78%);
    filter: blur(2px); border-radius: 50%; z-index: 1;
    opacity: 0; animation: fadeIn .5s ease both 3.4s;
  }
  .m-travel {
    position: absolute; left: 3%; bottom: 5%; height: 66%; aspect-ratio: 708 / 918; z-index: 2;
    animation: mTravel 1.9s cubic-bezier(.22,.66,.24,1) both 1.65s;
  }
  @keyframes mTravel {
    0%   { transform: translateX(-360px); opacity: 0; }
    12%  { opacity: 1; }
    86%  { transform: translateX(16px); }
    100% { transform: translateX(0); }
  }
  .m-bob { width: 100%; height: 100%; animation: mBob .32s ease-in-out both 1.78s 5; }
  @keyframes mBob { 0% { transform: translateY(0); } 50% { transform: translateY(-11px); } 100% { transform: translateY(0); } }
  .m-img {
    width: 100%; height: 100%; object-fit: contain; object-position: bottom; display: block;
    filter: drop-shadow(0 10px 22px rgba(2,5,20,.6));
    animation: mBreath 4s ease-in-out infinite both 4s;
  }
  @keyframes mBreath { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.005); } }

  /* ── КАРТОЧКА входа слева ── */
  .card {
    position: relative; z-index: 3; flex: 0 0 auto; width: 100%; max-width: 412px;
    padding: 32px 36px 28px; border-radius: 24px;
    background: linear-gradient(160deg, rgba(30,46,92,.34), rgba(12,24,56,.42));
    border: 1px solid rgba(160,195,255,.22);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 26px 64px rgba(2,5,20,.5);
    opacity: 0; animation: cardIn .85s cubic-bezier(.16,1,.3,1) both 1.0s;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: none; } }

  .logo { width: 162px; height: auto; display: block; margin-bottom: 22px; }
  .hi { font-size: clamp(30px, 3.2vw, 40px); font-weight: 800; line-height: 1.05; letter-spacing: -1.6px; color: #fff; }
  .hi em { font-style: normal; color: #6A6FF0; }
  .desc { margin-top: 11px; font-size: 14px; line-height: 1.5; color: var(--tx-soft); max-width: 40ch; }

  .tabs { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 4px;
    border-radius: 13px; background: rgba(10,20,48,.34); border: 1px solid rgba(160,195,255,.16); }
  .tab { border: 1px solid transparent; cursor: pointer; font: 700 13.5px 'Onest', sans-serif; padding: 10px 0; border-radius: 10px;
    background: transparent; color: var(--tx-soft); transition: color .18s, background .18s, box-shadow .18s; }
  .tab:not(.on):hover { color: #fff; }
  .tab.on { color: #fff;
    background: linear-gradient(180deg, rgba(64,152,255,.5), rgba(38,118,234,.3));
    border: 1px solid rgba(120,185,255,.6);
    box-shadow: inset 0 0 20px rgba(43,143,255,.45), inset 0 1px 0 rgba(255,255,255,.32); }

  .field { margin-top: 14px; }
  .field:first-of-type { margin-top: 18px; }
  .lbl { display: block; font-size: 12.5px; font-weight: 700; color: var(--tx-soft); margin-bottom: 7px; }
  .inp-wrap { position: relative; }
  .inp { width: 100%; height: 50px; padding: 0 16px; border-radius: 13px;
    background: rgba(3,9,28,.55); border: 1.5px solid rgba(150,185,255,.18); color: #fff;
    font: 500 14.5px 'Onest', sans-serif; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; }
  .inp::placeholder { color: #5C6488; }
  .inp:focus { border-color: rgba(43,143,255,.6); background: rgba(8,16,44,.7);
    box-shadow: inset 0 0 18px rgba(43,143,255,.18), 0 0 0 3px rgba(43,143,255,.12); }
  .inp.pw { padding-right: 50px; }
  .eye { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px;
    display: grid; place-items: center; border: 0; background: transparent; color: var(--tx-mute); cursor: pointer;
    border-radius: 10px; transition: color .15s, background .15s; }
  .eye:hover { color: #fff; background: rgba(43,143,255,.12); }
  .eye svg { width: 20px; height: 20px; }

  .btn { margin-top: 20px; width: 100%; height: 52px; border: 0; border-radius: 14px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font: 700 15.5px 'Onest', sans-serif; color: #fff; background: #2073E6;
    box-shadow: inset 0 0 24px rgba(175,215,255,.95), inset 0 0 8px rgba(255,255,255,.5), inset 0 1px 0 rgba(255,255,255,.5);
    transition: background .12s, transform .08s; }
  .btn:hover { background: #2B8FFF; }
  .btn:active { transform: translateY(1px); }

  .foot { margin-top: 16px; text-align: center; font-size: 12.5px; color: var(--tx-mute); }
  .foot a { font-weight: 700; color: var(--violet-2); text-decoration: none; }
  .foot a:hover { color: var(--violet-soft); }

  /* ── планшеты/телефоны: сцена уходит в фон, карточка по центру ── */
  @media (max-width: 880px) {
    .veil { background: linear-gradient(180deg, rgba(3,8,28,.55), rgba(3,8,28,.9) 50%); }
    .wrap { justify-content: center; padding: 24px 18px; }
    .stage { position: absolute; inset: 0; z-index: 0; opacity: .42; align-items: center; justify-content: center; }
    .scene-inner { width: 150%; }
    .card { margin: 0 auto; max-width: 432px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .mtn-body, .route-dot, .peak-star, .peak-halo, .peak-glow,
    .m-shadow, .m-travel, .m-bob, .m-img, .card {
      animation: none !important; opacity: 1 !important; transform: none !important;
    }
    .peak-halo { opacity: .55 !important; }
    .trail-glow { stroke-dashoffset: 0 !important; }
    .fly-star { display: none; }
  }
</style>
</head>
<body>
<div class="veil"></div>

<div class="wrap">
  <!-- КАРТОЧКА -->
  <div class="card">
    <img class="logo" src="assets/logo.png" alt="ИстСайд.рф — языковой центр" />
    <h1 class="hi">Добро <span id="hiTail">пожаловать<em>!</em></span></h1>
    <p class="desc" id="desc">Войдите, чтобы сохранить результаты и продолжить подготовку к поступлению за рубеж.</p>

    <div class="tabs">
      <button class="tab on" id="tabLogin" type="button">Вход</button>
      <button class="tab" id="tabReg" type="button">Регистрация</button>
    </div>

    <form id="form" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label class="lbl" for="email">Почта</label>
        <div class="inp-wrap"><input class="inp" id="email" type="email" placeholder="you@example.com" /></div>
      </div>
      <div class="field">
        <label class="lbl" for="pass">Пароль</label>
        <div class="inp-wrap">
          <input class="inp pw" id="pass" type="password" placeholder="ваш пароль" />
          <button class="eye" id="eye" type="button" aria-label="Показать пароль">
            <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M3 3l18 18"/><path d="M10.6 6.1A9 9 0 0112 6c6 0 9.5 6 9.5 6a16 16 0 01-3.3 3.8M6.2 7.2A16 16 0 002.5 12s3.5 6.5 9.5 6.5a8.8 8.8 0 003.3-.6"/><path d="M9.5 10.5a3 3 0 004 4"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="submit" type="submit"><span id="btnTxt">Войти</span></button>
    </form>

    <p class="foot" id="foot">Впервые здесь? <a href="#" id="switchLink">Создать аккаунт</a></p>
  </div>

  <!-- СЦЕНА -->
  <div class="stage">
    <div class="scene-inner">
      <svg class="scene" viewBox="0 0 280 142" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none">
        <defs>
          <filter id="glowDot" x="-220%" y="-220%" width="540%" height="540%">
            <feGaussianBlur stdDeviation="2.2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="starHalo">
            <stop offset="0" stop-color="rgba(190,218,255,.98)"/>
            <stop offset=".4" stop-color="rgba(55,140,248,.42)"/>
            <stop offset="1" stop-color="rgba(55,140,248,0)"/>
          </radialGradient>
          <radialGradient id="peakGlow" cx="50%" cy="20%" r="80%">
            <stop offset="0" stop-color="rgba(60,150,250,.5)"/>
            <stop offset="1" stop-color="rgba(60,150,250,0)"/>
          </radialGradient>
        </defs>

        <ellipse class="peak-glow" cx="212" cy="40" rx="78" ry="64" fill="url(#peakGlow)"/>

        <g fill="#CDD2FF">
          <circle class="bg-star" cx="40" cy="28" r="1.1"/><circle class="bg-star" cx="92" cy="18" r=".8"/>
          <circle class="bg-star" cx="150" cy="34" r="1"/><circle class="bg-star" cx="64" cy="58" r=".7"/>
          <circle class="bg-star" cx="118" cy="50" r=".7"/><circle class="bg-star" cx="258" cy="46" r="1"/>
          <circle class="bg-star" cx="244" cy="92" r=".7"/><circle class="bg-star" cx="20" cy="84" r=".8"/>
        </g>

        <g class="mtn-body">
          <path d="M0 132 L34 126 L34 142 Z" fill="#1A3A9C"/><path d="M0 132 L34 142 L0 142 Z" fill="#122A5C"/>
          <path d="M34 126 L66 120 L66 142 Z" fill="#2043AE"/><path d="M34 126 L66 142 L34 142 Z" fill="#163066"/>
          <path d="M66 120 L96 112 L96 142 Z" fill="#1B3CA0"/><path d="M66 120 L96 142 L66 142 Z" fill="#132B5E"/>
          <path d="M96 112 L124 98 L124 142 Z" fill="#2246B2"/><path d="M96 112 L124 142 L96 142 Z" fill="#173268"/>
          <path d="M124 98 L150 84 L150 142 Z" fill="#1D3EA6"/><path d="M124 98 L150 142 L124 142 Z" fill="#142C60"/>
          <path d="M150 84 L176 62 L176 142 Z" fill="#2449B6"/><path d="M150 84 L176 142 L150 142 Z" fill="#18346C"/>
          <path d="M176 62 L196 46 L196 142 Z" fill="#1E40A8"/><path d="M176 62 L196 142 L176 142 Z" fill="#142A60"/>
          <path d="M196 46 L212 30 L212 142 Z" fill="#2A52C2"/><path d="M196 46 L212 142 L196 142 Z" fill="#1B3CA0"/>
          <path d="M212 30 L232 54 L232 142 Z" fill="#102E64"/><path d="M212 30 L232 142 L212 142 Z" fill="#0A2358"/>
          <path d="M232 54 L252 80 L252 142 Z" fill="#0C275E"/><path d="M232 54 L252 142 L232 142 Z" fill="#091F52"/>
          <path d="M252 80 L272 104 L272 142 Z" fill="#0A2358"/><path d="M252 80 L272 142 L252 142 Z" fill="#07194C"/>
          <path d="M272 104 L280 112 L280 142 Z" fill="#0A2256"/><path d="M272 104 L280 142 L272 142 Z" fill="#071846"/>
          <path d="M212 30 L201 47 L212 50 L223 47 Z" fill="#79A6F2" opacity=".85"/>
          <path d="M212 30 L212 50 L223 47 Z" fill="#2A52C2" opacity=".8"/>
          <g stroke="#091540" stroke-width=".7" opacity=".5">
            <path d="M34 126 L34 142M66 120 L66 142M96 112 L96 142M124 98 L124 142M150 84 L150 142M176 62 L176 142M196 46 L196 142M232 54 L232 142M252 80 L252 142"/>
          </g>
        </g>

        <path d="M0 132 L34 126 L66 120 L96 112 L124 98 L150 84 L176 62 L196 46 L212 30"
              stroke="rgba(120,185,255,.18)" stroke-width="1.2" stroke-linejoin="round" class="mtn-body"/>

        <path id="trailPath" class="trail-glow"
              d="M0 132 L34 126 L66 120 L96 112 L124 98 L150 84 L176 62 L196 46 L212 30"
              stroke="rgba(130,195,255,.95)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"
              filter="url(#glowDot)" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
          <animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.6s" dur="1.95s" fill="freeze"/>
        </path>

        <g filter="url(#glowDot)">
          <circle class="route-dot d0" cx="0"   cy="132" r="3.6" fill="#3FA2FF"/>
          <circle class="route-dot d1" cx="34"  cy="126" r="3.1" fill="#5CB4FF"/>
          <circle class="route-dot d2" cx="66"  cy="120" r="3.2" fill="#5CB4FF"/>
          <circle class="route-dot d3" cx="96"  cy="112" r="3.2" fill="#5CB4FF"/>
          <circle class="route-dot d4" cx="124" cy="98"  r="3.3" fill="#3FA2FF"/>
          <circle class="route-dot d5" cx="150" cy="84"  r="3.3" fill="#86C4FF"/>
          <circle class="route-dot d6" cx="176" cy="62"  r="3.3" fill="#B0DCFF"/>
        </g>

        <g class="fly-star" filter="url(#glowDot)" opacity="0">
          <path d="M0 -5l1.4 3.6 3.6 1.4-3.6 1.4-1.4 3.6-1.4-3.6-3.6-1.4 3.6-1.4z" fill="#EAF4FF"/>
          <animateMotion begin="0.6s" dur="1.95s" rotate="0" fill="freeze">
            <mpath xlink:href="#trailPath"/>
          </animateMotion>
          <animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.12s" fill="freeze"/>
          <animate attributeName="opacity" values="1;0" begin="2.45s" dur=".2s" fill="freeze"/>
        </g>

        <circle class="peak-halo" cx="212" cy="28" r="18" fill="url(#starHalo)"/>
        <circle class="burst-ring" cx="212" cy="28" r="5" stroke="rgba(170,210,255,.9)" stroke-width="1.2"/>
        <g class="peak-star" filter="url(#glowDot)">
          <path d="M212 12l3.3 12.7 12.7 3.3-12.7 3.3-3.3 12.7-3.3-12.7-12.7-3.3 12.7-3.3 3.3-12.7z" fill="#EAF4FF"/>
          <path d="M212 5v46M189 28h46" stroke="rgba(244,241,255,.45)" stroke-width=".8"/>
        </g>
      </svg>

      <div class="m-shadow"></div>
      <div class="m-travel"><div class="m-bob"><img class="m-img" src="assets/mascot-cut.png" alt="Артем" /></div></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var reg = false;
  var tabLogin = document.getElementById('tabLogin'), tabReg = document.getElementById('tabReg');
  var btnTxt = document.getElementById('btnTxt');
  var desc = document.getElementById('desc'), foot = document.getElementById('foot');

  function setMode(r) {
    reg = r;
    tabLogin.classList.toggle('on', !r);
    tabReg.classList.toggle('on', r);
    btnTxt.textContent = r ? 'Создать аккаунт' : 'Войти';
    desc.textContent = r
      ? 'Зарегистрируйтесь по почте — мы отправим код подтверждения. Имя и анкету заполните на следующем шаге.'
      : 'Войдите, чтобы сохранить результаты и продолжить подготовку к поступлению за рубеж.';
    foot.innerHTML = r
      ? 'Уже есть аккаунт? <a href="#" id="switchLink">Войти</a>'
      : 'Впервые здесь? <a href="#" id="switchLink">Создать аккаунт</a>';
    document.getElementById('switchLink').addEventListener('click', function (e) { e.preventDefault(); setMode(!reg); });
  }
  tabLogin.addEventListener('click', function () { setMode(false); });
  tabReg.addEventListener('click', function () { setMode(true); });
  document.getElementById('switchLink').addEventListener('click', function (e) { e.preventDefault(); setMode(true); });

  var pass = document.getElementById('pass'), eOpen = document.getElementById('eyeOpen'), eOff = document.getElementById('eyeOff');
  document.getElementById('eye').addEventListener('click', function () {
    var show = pass.type === 'password';
    pass.type = show ? 'text' : 'password';
    eOpen.style.display = show ? 'none' : 'block';
    eOff.style.display = show ? 'block' : 'none';
  });

  document.getElementById('submit').addEventListener('click', function () {
    window.location.href = 'diagnostic-dark.html';
  });
})();
</script>
</body>
</html>
