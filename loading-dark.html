<!doctype html>
<!-- loading-dark.html — премиальный экран расчета между анкетой и диагностикой.
     Режим A «Атмосфера»: тёмное небо + тихое сапфировое свечение. Якорь — одно
     кольцо прогресса со светящейся головой-кометой и числом в центре. Под ним —
     тихие заголовок/подзаголовок, сменяются по стадиям анализа. Никаких карточек,
     рамок, логотипов — только центральная композиция. Шрифт системный, как во
     всем dark-флоу. По окончании — replace на diagnostic-dark.html. -->
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>EastSide — Расчет</title>
<style>
  /* единый шрифт интерфейса — системный (SF Pro / Segoe UI), как на остальных dark-страницах */
  :root{
    --font-display:'SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif;
    --font-text:var(--font-display);--font-ui:var(--font-display);
  }
  *,*::before,*::after{font-family:var(--font-display)!important}

  :root{
    --base:#03081C;          /* фон неба */
    --tx:#FFFFFF;            /* белый — число и заголовок */
    --tx-soft:#AEB7D8;       /* мягкий — подзаголовок */
    --tx-mute:#6A739B;       /* приглушенный */
    --acc:#5CB4FF;          /* светлый сапфир — дуга, % , голова */
    --acc-deep:#1E72E6;      /* глубокий сапфир — низ дуги */
    --acc-soft:#9FCBFF;      /* мягкий акцент */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--base); color:var(--tx); overflow:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* дышащее сапфировое свечение позади всего — фон не мертвый, медленно пульсирует */
  .sky{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(620px 620px at 50% 46%, rgba(43,143,255,.16), rgba(43,143,255,.05) 42%, transparent 70%),
      radial-gradient(1200px 760px at 50% 120%, rgba(22,90,210,.10), transparent 64%);
    animation:breathe 9s ease-in-out infinite;
    will-change:transform,opacity;
  }
  @keyframes breathe{
    0%,100%{ opacity:.78; transform:scale(1); }
    50%    { opacity:1;   transform:scale(1.07); }
  }

  .stage{
    position:relative; z-index:1; min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    /* оптический центр — чуть выше геометрического */
    transform:translateY(-16px);
    padding:clamp(28px,5vw,56px);
    animation:pageIn .7s cubic-bezier(.32,.72,0,1) both;
  }
  @keyframes pageIn{ from{opacity:0} to{opacity:1} }

  /* ── якорь: кольцо прогресса ─────────────────────────────────────────── */
  .ring{ position:relative; width:clamp(236px,40vw,284px); aspect-ratio:1; }
  .ring svg{ display:block; width:100%; height:100%; overflow:visible; }

  /* число по центру кольца */
  .num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .num .val{
    display:inline-flex; align-items:baseline;
    font-size:clamp(40px,5vw,60px);   /* база em для числа и % — число «плавает» в кольце с воздухом */
  }
  .num .big{
    font-weight:800; font-size:1em; line-height:1;
    letter-spacing:-.045em; color:var(--tx);
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1;
  }
  .num .pct{
    font-weight:600; font-size:.4em; color:var(--acc);
    margin-left:.05em; letter-spacing:-.02em;
  }

  /* ── тихая копия под кольцом ─────────────────────────────────────────── */
  .copy{
    margin-top:clamp(44px,6vw,58px); text-align:center; max-width:22ch;
    transition:opacity .36s ease, transform .36s cubic-bezier(.16,1,.3,1);
    will-change:opacity,transform;
  }
  .copy.swap{ opacity:0; transform:translateY(8px); }
  .copy h1{
    font-weight:600; font-size:clamp(20px,2.2vw,28px); line-height:1.16;
    letter-spacing:-.025em; color:var(--tx); text-wrap:balance;
  }
  .copy p{
    margin-top:12px; font-weight:500; font-size:clamp(13.5px,1.35vw,16px);
    line-height:1.5; letter-spacing:-.01em; color:var(--tx-soft);
  }

  /* финиш — копия мягко уходит в сапфир, затем весь экран растворяется */
  .stage.done .num .big{ color:var(--acc-soft); transition:color .5s ease; }
  .stage.exit{ animation:stageOut .55s cubic-bezier(.5,0,.75,0) both; }
  @keyframes stageOut{
    0%{ opacity:1; transform:translateY(-16px) scale(1); filter:blur(0); }
    100%{ opacity:0; transform:translateY(-16px) scale(1.035); filter:blur(4px); }
  }

  @media (prefers-reduced-motion: reduce){
    .sky{ animation:none; }
    .stage,.stage.exit{ animation:none; }
    .copy{ transition:opacity .2s ease; }
    .head-trail{ animation:none; }
  }
  /* ── Мягкая смена страниц: тихий кроссфейд (без «странного» блюра). Где
     cross-document VT не поддержан — мгновенно, без регрессии. */
  ::view-transition-old(root){ animation: vtFadeOut .26s ease both; }
  ::view-transition-new(root){ animation: vtFadeIn .34s ease both; }
  @keyframes vtFadeOut{ to{ opacity: 0; } }
  @keyframes vtFadeIn { from{ opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    ::view-transition-old(root), ::view-transition-new(root) { animation: none; }
  }
  /* ── Переход между страницами — «перелистывание»: непрозрачная панель цвета
     ночного неба проезжает поперёк экрана. Вперёд: заезжает справа, накрывает,
     на новой странице уходит влево, открывая её. Назад — зеркально. Только
     transform (GPU, iOS-safe), виден в ЛЮБОМ браузере. */
  #pt{ position:fixed; inset:0; z-index:9998; pointer-events:none;
    background: linear-gradient(115deg, #08153A 0%, #03081C 52%, #060F2A 100%);
    transform: translateX(0); will-change: transform;
    animation: ptEnter .56s cubic-bezier(.5,0,.15,1) both; }
  @keyframes ptEnter{ from{ transform: translateX(0); } to{ transform: translateX(-100%); } }
  @keyframes ptEnterBack{ from{ transform: translateX(0); } to{ transform: translateX(100%); } }
  html.pt-back #pt{ animation-name: ptEnterBack; }
  @media (prefers-reduced-motion: reduce){ #pt{ animation:none; transform:translateX(-100%); } }
</style>

<script>
(function(){
  try{ history.scrollRestoration='manual'; }catch(e){}
  // направление перелистывания входящей страницы (назад — зеркально): класс ДО отрисовки #pt
  try{ var _d = sessionStorage.getItem('es_ptdir'); if(_d){ sessionStorage.removeItem('es_ptdir'); if(_d==='back') document.documentElement.className += ' pt-back'; } }catch(e){}
  var RM = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  window.esGo = function(url, replace, dir){
    var go = function(){ replace ? location.replace(url) : (location.href = url); };
    var pt = document.getElementById('pt');
    if (RM || !pt){ go(); return; }
    dir = dir === 'back' ? 'back' : 'fwd';
    try{ sessionStorage.setItem('es_ptdir', dir); }catch(e){}
    pt.style.animation = 'none';
    pt.style.transition = 'none';
    pt.style.transform = 'translateX(' + (dir === 'back' ? '-100%' : '100%') + ')';
    void pt.offsetWidth;
    pt.style.transition = 'transform .34s cubic-bezier(.5,0,.15,1)';
    pt.style.transform = 'translateX(0)';
    setTimeout(go, 320);
  };
  document.addEventListener('click', function(e){
    var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
    if (!a || a.target === '_blank' || a.hasAttribute('download')) return;
    var href = a.getAttribute('href') || '';
    if (!href || href.charAt(0) === '#') return;
    if (/^(https?:)?\/\//i.test(href) || /^(mailto:|tel:)/i.test(href)) return;
    if (!/\.html(\?|#|$)/.test(href)) return;
    e.preventDefault();
    var back = /back/i.test(a.className || '') || a.hasAttribute('data-back');
    window.esGo(href, false, back ? 'back' : 'fwd');
  }, true);
  addEventListener('pageshow', function(e){
    try{ scrollTo(0,0); }catch(_){}
    var pt = document.getElementById('pt');
    if (pt && e.persisted){ pt.style.animation='none'; pt.style.transition='none'; pt.style.transform='translateX(-100%)'; }
  });
})();
</script>
</head>
<body>
<div id="pt" aria-hidden="true"></div>
  <div class="sky"></div>

  <div class="stage" id="stage">
    <div class="ring">
      <svg viewBox="0 0 300 300" aria-hidden="true">
        <defs>
          <!-- мягкое свечение дуги -->
          <filter id="arcGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.4" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <!-- свечение головы -->
          <filter id="headGlow" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur stdDeviation="3.6" result="hb" />
            <feMerge><feMergeNode in="hb" /><feMergeNode in="hb" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <!-- градиент дуги: глубокий сапфир → светлый к голове -->
          <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse" x1="40" y1="260" x2="260" y2="40">
            <stop offset="0"   stop-color="#1E72E6" />
            <stop offset=".55" stop-color="#3F9BFF" />
            <stop offset="1"   stop-color="#8FCBFF" />
          </linearGradient>
        </defs>

        <!-- база: почти невидимое кольцо -->
        <circle cx="150" cy="150" r="128" fill="none"
                stroke="rgba(124,164,255,.10)" stroke-width="3.4" />

        <!-- дуга прогресса (rotate -90 → старт сверху, идет по часовой) -->
        <circle id="arc" cx="150" cy="150" r="128" fill="none"
                stroke="url(#arcGrad)" stroke-width="3.4" stroke-linecap="round"
                transform="rotate(-90 150 150)" filter="url(#arcGlow)"
                stroke-dasharray="804.25" stroke-dashoffset="804.25" />

        <!-- голова-комета: трейл из затухающих точек + яркое ядро. group вращается JS -->
        <g id="head">
          <circle cx="150" cy="22" r="1.3" fill="#9FCBFF" opacity=".22"
                  transform="rotate(-9 150 150)" />
          <circle cx="150" cy="22" r="1.9" fill="#BFE0FF" opacity=".5"
                  transform="rotate(-5 150 150)" />
          <circle cx="150" cy="22" r="7" fill="rgba(124,180,255,.3)" filter="url(#headGlow)" />
          <circle cx="150" cy="22" r="3.4" fill="#EAF4FF" filter="url(#headGlow)" />
        </g>
      </svg>

      <div class="num"><span class="val"><span class="big" id="num">0</span><span class="pct">%</span></span></div>
    </div>

    <div class="copy" id="copy">
      <h1 id="title">Анализирую ваши данные</h1>
      <p id="sub">Проверяю академический профиль и исходные параметры</p>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // стадии анализа — заголовок + подзаголовок, сменяются по мере прогресса.
  // голос на «вы», без буквы «ё», честно, без обещаний.
  var STAGES = [
    { t:'Анализирую ваши данные',  s:'Проверяю академический профиль и баллы' },
    { t:'Подбираю вузы под вас',   s:'Сравниваю сотни программ под ваш профиль' },
    { t:'Оцениваю шансы на грант', s:'Учитываю язык, оценки и сроки подачи' },
    { t:'Считаю бюджет года',      s:'Сравниваю стоимость — с грантом и без' },
    { t:'Собираю ваш план',        s:'Свожу разбор и маршрут в одну картину' }
  ];

  var R = 128, C = 2 * Math.PI * R;              // длина окружности
  var arc   = document.getElementById('arc');
  var head  = document.getElementById('head');
  var numEl = document.getElementById('num');
  var copy  = document.getElementById('copy');
  var titleEl = document.getElementById('title');
  var subEl   = document.getElementById('sub');
  var stage = document.getElementById('stage');

  arc.setAttribute('stroke-dasharray', C.toFixed(2));

  // прогресс/число/дуга/голова — всё из одного значения disp, поэтому дуга всегда
  // ровно равна числу.
  var start = performance.now();
  var DUR = 8200;
  var disp = 0, curStage = -1, finishing = false;

  function ease(p){ return 1 - Math.pow(1 - p, 2.6); }   // ease-out, замедляется к концу

  function render(v){
    var p = v / 100;
    numEl.textContent = Math.round(v);
    arc.setAttribute('stroke-dashoffset', (C * (1 - p)).toFixed(2));
    head.setAttribute('transform', 'rotate(' + (p * 360).toFixed(2) + ' 150 150)');
  }

  function swapCopy(i){
    var st = STAGES[i];
    copy.classList.add('swap');
    setTimeout(function(){
      titleEl.textContent = st.t;
      subEl.textContent   = st.s;
      copy.classList.remove('swap');
    }, 360);
  }

  function frame(now){
    var p = Math.min(1, (now - start) / DUR);
    var target = ease(p) * 99;
    disp += (target - disp) * 0.16;
    if (target - disp < 0.4) disp = target;
    render(disp);

    var want = Math.min(STAGES.length - 1, Math.floor(p * STAGES.length));
    if (!finishing && want !== curStage){
      if (curStage < 0){ titleEl.textContent = STAGES[want].t; subEl.textContent = STAGES[want].s; }
      else swapCopy(want);
      curStage = want;
    }

    if (p < 1){ requestAnimationFrame(frame); return; }

    if (!finishing){
      finishing = true;
      // довести до 100 и завершить
      swapCopy2('Готово', 'Открываю ваш разбор');
      var i = 0;
      (function settle(){
        disp += (100 - disp) * 0.28;
        render(disp);
        if (100 - disp > 0.4 && i++ < 50) requestAnimationFrame(settle);
        else { render(100); finish(); }
      })();
    }
  }

  // отдельный swap без индекса — для финального «Готово»
  function swapCopy2(t, s){
    copy.classList.add('swap');
    setTimeout(function(){ titleEl.textContent = t; subEl.textContent = s; copy.classList.remove('swap'); }, 360);
  }

  function finish(){
    stage.classList.add('done');
    setTimeout(function(){ stage.classList.add('exit'); }, 850);
    // replace (не href): экран расчета НЕ остается в истории — «назад» с диагностики
    // не возвращает на пересчет.
    setTimeout(function(){ window.location.replace('diagnostic-dark.html'); }, 1320);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
