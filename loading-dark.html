<!doctype html>
<!-- loading-dark.html — темная загрузка, ободранная до кости (как оригинал
     screens.jsx): одна крупная вращающаяся фраза + числовой ролик + подсказка.
     Текст — это весь UI. Никакой горы/рамки/бренда. Premium minimalist. -->
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EastSide — Генерация</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
/* единый шрифт интерфейса — менять тут одной строкой */
:root{--font-display:'SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif}
*,*::before,*::after{font-family:var(--font-display)!important}

  :root {
    --bg: #04081A; --ink: #EEF2FF; --ink-soft: #AEB6D8; --ink-faint: #6A739B;
    --acc: #5CB4FF; --acc-ink: #8FCBFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Onest', 'Segoe UI', sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; }
  /* почти незаметный теплый перелив — не блоб, просто чтобы фон не был мертвым */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(1100px 700px at 50% 42%, rgba(30,90,200,.12), transparent 66%);
  }

  .ld-wrap {
    position: relative; min-height: 100vh; display: grid; place-items: center;
    padding: clamp(28px, 5vw, 56px);
    animation: pageIn .6s cubic-bezier(.32,.72,0,1) both;
  }
  @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

  /* статус-строка сверху — что происходит (Nielsen: видимость статуса) */
  .ld-top { position: absolute; top: clamp(40px, 8vw, 86px); left: 0; right: 0; text-align: center; }
  .ld-top-k {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12.5px; font-weight: 700; letter-spacing: 0; text-transform: none; color: var(--ink-faint);
  }
  .ld-top-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--acc);
    box-shadow: 0 0 10px var(--acc); animation: ldPulse 1.5s ease-in-out infinite; }
  @keyframes ldPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.7); } }

  /* ГЕРОЙ — одна крупная фраза, слова всплывают из своих масок с блюром */
  .ld-line {
    margin: 0; max-width: 16ch;
    font-family: 'Onest', sans-serif; font-weight: 700;
    font-size: clamp(28px, 3.2vw, 52px); letter-spacing: -.04em; line-height: 1.06;
    color: var(--ink); text-align: center; text-wrap: balance;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 0 .26em;
  }
  .ld-w { display: inline-block; overflow: hidden; padding: .02em .02em .12em; }
  .ld-w i {
    display: inline-block; font-style: normal; will-change: transform, opacity;
    animation: ldRise 1s cubic-bezier(.16,1,.3,1) both; animation-delay: calc(var(--i,0) * .055s);
  }
  @keyframes ldRise {
    0%   { transform: translateY(118%); opacity: 0; filter: blur(7px); }
    55%  { opacity: 1; filter: blur(0); }
    100% { transform: translateY(0); opacity: 1; filter: blur(0); }
  }
  .ld-line.leaving .ld-w i { animation: ldLeave .44s cubic-bezier(.5,0,.75,0) both; animation-delay: calc(var(--i,0) * .03s); }
  @keyframes ldLeave { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-72%); opacity: 0; } }

  /* числовой счетчик внизу — монотонный, Space Grotesk, табличные цифры */
  .ld-count {
    position: absolute; left: 0; right: 0; bottom: clamp(108px, 15vw, 140px);
    display: flex; justify-content: center; align-items: flex-start; gap: .08em;
    font-family: 'Space Grotesk', 'Onest', sans-serif; font-weight: 600;
    font-size: clamp(34px, 3.6vw, 56px); letter-spacing: -.03em; color: var(--ink);
    font-variant-numeric: tabular-nums; line-height: 1; transition: color .5s ease;
  }
  .ld-pct { font-size: .42em; font-weight: 500; color: var(--ink-faint); margin-top: .3em; transition: color .5s ease; }

  .ld-hint {
    position: absolute; left: 0; right: 0; bottom: clamp(34px, 5vw, 48px);
    text-align: center; padding: 0 32px;
    font-size: 13px; line-height: 1.45; color: var(--ink-faint); letter-spacing: -.01em;
    transition: opacity .3s;
  }

  /* финиш — фраза и счетчик мягко уходят в sapphire, потом передача дальше */
  .ld-wrap.done .ld-line, .ld-wrap.done .ld-count { color: var(--acc-ink); }
  .ld-wrap.done .ld-count .ld-pct { color: var(--acc); }
  .ld-wrap.exit { animation: ldOut .5s cubic-bezier(.5,0,.75,0) both; }
  @keyframes ldOut { 0% { opacity: 1; transform: scale(1); filter: blur(0); } 100% { opacity: 0; transform: scale(1.03); filter: blur(3px); } }

  @media (prefers-reduced-motion: reduce) {
    .ld-w i, .ld-line.leaving .ld-w i { animation: none; transform: none; opacity: 1; filter: none; }
    .ld-wrap, .ld-wrap.exit { animation: none; }
  }
</style>
</head>
<body>
<div class="ld-wrap" id="wrap">
  <div class="ld-top"><span class="ld-top-k"><span class="ld-top-dot"></span> Генерация диагностики</span></div>

  <p class="ld-line" id="line"></p>

  <div class="ld-count"><span id="num">0</span><span class="ld-pct">%</span></div>

  <p class="ld-hint" id="hint">Собираю вашу диагностику и план — обычно меньше минуты</p>
</div>

<script>
(function () {
  'use strict';
  var phrases = [
    'Читаю вашу анкету',
    'Перевожу средний балл в китайскую шкалу',
    'Сопоставляю профиль с требованиями вузов',
    'Считаю реальные шансы по категориям',
    'Подбираю вузы под ваш профиль',
    'Проверяю, под какие гранты вы проходите',
    'Считаю бюджет года — с грантом и без',
    'Собираю план по шагам',
    'Свожу все в одну честную картину',
  ];
  var line = document.getElementById('line');
  var numEl = document.getElementById('num');
  var wrap = document.getElementById('wrap');

  function setLine(text) {
    line.className = 'ld-line';
    line.innerHTML = text.split(' ').map(function (w, i) {
      return '<span class="ld-w"><i style="--i:' + i + '">' + w + '</i></span>';
    }).join('');
  }
  function leaveLine(cb) { line.classList.add('leaving'); setTimeout(cb, 360); }

  var start = performance.now();
  var DUR = 7000;
  var curPhrase = -1, finishing = false;
  var disp = 0;                 // плавно догоняет target (монотонно вверх)

  function ease(p) { return 1 - Math.pow(1 - p, 2.4); }

  function frame(now) {
    var p = Math.min(1, (now - start) / DUR);
    var target = Math.round(ease(p) * 99);
    disp += (target - disp) * 0.2;
    if (target - disp < 0.5) disp = target;
    numEl.textContent = Math.round(disp);

    var want = Math.min(phrases.length - 1, Math.floor(p * phrases.length));
    if (!finishing && want !== curPhrase) {
      var first = curPhrase < 0; curPhrase = want;
      if (first) setLine(phrases[want]);
      else leaveLine(function () { setLine(phrases[curPhrase]); });
    }

    // время вышло → завершаем (раньше цикл застревал на 99, т.к. target капался на 99)
    if (p < 1) { requestAnimationFrame(frame); return; }
    if (!finishing) {
      finishing = true;
      leaveLine(function () {
        setLine('Готово');
        var i = 0;
        (function settle() {            // докрутить до 100
          disp += (100 - disp) * 0.3;
          numEl.textContent = Math.round(disp);
          if (100 - disp > 0.5 && i++ < 40) requestAnimationFrame(settle);
          else { numEl.textContent = 100; finish(); }
        })();
      });
    }
  }
  function finish() {
    wrap.classList.add('done');
    document.getElementById('hint').style.opacity = 0;
    setTimeout(function () { wrap.classList.add('exit'); }, 900);
    // replace (не href): экран загрузки НЕ остается в истории — стрелка «назад»
    // браузера с диагностики/маршрута не возвращает на пересчет загрузки
    setTimeout(function () { window.location.replace('diagnostic-dark.html'); }, 1350);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
